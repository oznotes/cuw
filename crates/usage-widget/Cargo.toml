# claude-usage-widget — the gpui GUI shell.
#
# NOT BUILT YET. Requires, on top of the stable toolchain:
#   * CMake on PATH                 (gpui builds native deps with it)
#   * Rust 1.95.0                   (see rust-toolchain.toml; matches Zed)
#   * MSVC "Desktop development with C++" (already present on this machine)
#
# The git deps track zed `main` with no upstream pin. The VERY FIRST build
# (milestone M0) must capture working revs into Cargo.lock and add `rev = "..."`
# to the three git deps below, then commit Cargo.lock.

[package]
name = "claude-usage-widget"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "claude-usage-widget"
path = "src/main.rs"

[dependencies]
usage-core = { path = "../usage-core", features = ["net"] }
anyhow = "1"

# Pin `rev = "<captured-in-M0>"` on these three once a known-good build exists.
gpui = { git = "https://github.com/zed-industries/zed" }
gpui_platform = { git = "https://github.com/zed-industries/zed", features = ["font-kit"] }
gpui-component = { git = "https://github.com/longbridge/gpui-component" }

raw-window-handle = "0.6"
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_SystemInformation",
] }

[build-dependencies]
embed-resource = "2"

[profile.release]
lto = true
strip = true
